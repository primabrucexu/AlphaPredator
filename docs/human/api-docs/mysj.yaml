openapi: 3.0.3
info:
  title: "麦蕊数据 API"
  version: "2026-05-12"
  description: "根据 https://mairuiapi.com/hsdata 页面整理。所有接口均为 GET，返回 JSON 数组。"
servers:
  - url: "https://api.mairuiapi.com"
    description: "默认域名"
tags:
  - name: "列表与板块"
  - name: "公司资料"
  - name: "实时交易"
  - name: "历史行情"
  - name: "财务数据"
  - name: "技术指标"
paths:
  "/hslt/list/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hslt_list_1"
      summary: "股票列表"
      description: "获取基础的股票代码和名称，用于后续接口的参数传入。"
      parameters:
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockListResponse"
  "/hslt/new/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hslt_new_2"
      summary: "新股日历"
      description: "新股日历，按申购日期倒序。"
      parameters:
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewStockCalendarResponse"
  "/hslt/sectorslist/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hslt_sectorslist_3"
      summary: "概念指数列表（券商数据）"
      description: "获取基础的概念指数代码和名称，用于后续接口的参数传入。"
      parameters:
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConceptIndexListResponse"
  "/hslt/primarylist/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hslt_primarylist_4"
      summary: "一级市场板块列表（券商数据）"
      description: "获取基础的一级市场板块名称，用于后续接口的参数传入。"
      parameters:
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrimarySectorListResponse"
  "/hslt/sectors/{sector_name}/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hslt_sectors_5"
      summary: "板块明细列表（券商数据）"
      description: "依据《一级市场板块列表》获取的一级市场板块名称，获取对应的板块列表。"
      parameters:
        - $ref: "#/components/parameters/SectorName"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorDetailListResponse"
  "/hszg/list/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hszg_list_6"
      summary: "指数、行业、概念树"
      description: "获取指数、行业、概念（包括基金，债券，美股，外汇，期货，黄金等的代码），其中isleaf为1（叶子节点）的记录的code（代码）可以作为下方接口的参数传入，从而得到某个指数、行业、概念下的相关股票。"
      parameters:
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConceptTreeResponse"
  "/hszg/gg/{concept_code}/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hszg_gg_7"
      summary: "根据指数、行业、概念找相关股票"
      description: "根据“指数、行业、概念树”接口得到的代码作为参数，得到相关的股票。"
      parameters:
        - $ref: "#/components/parameters/ConceptCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StocksByConceptResponse"
  "/hszg/zg/{stock_code}/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hszg_zg_8"
      summary: "根据股票找相关指数、行业、概念"
      description: "根据《股票列表》得到的股票代码作为参数，得到相关的指数、行业、概念。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConceptsByStockResponse"
  "/hslt/ztgc/{date}/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hslt_ztgc_9"
      summary: "涨停股池"
      description: "根据日期（格式yyyy-MM-dd，例如2026-01-01）作为参数，得到每天的涨停股票列表，根据封板时间升序，该接口可获取30天左右的数据。"
      parameters:
        - $ref: "#/components/parameters/TradeDate"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LimitUpPoolResponse"
  "/hslt/dtgc/{date}/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hslt_dtgc_10"
      summary: "跌停股池"
      description: "根据日期（格式yyyy-MM-dd，例如2026-01-01）作为参数，得到每天的跌停股票列表，根据封单资金升序，该接口可获取30天左右的数据。"
      parameters:
        - $ref: "#/components/parameters/TradeDate"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LimitDownPoolResponse"
  "/hslt/qsgc/{date}/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hslt_qsgc_11"
      summary: "强势股池"
      description: "根据日期（格式yyyy-MM-dd，例如2026-01-01）作为参数，得到每天的强势股票列表，根据涨幅倒序，该接口可获取30天左右的数据。"
      parameters:
        - $ref: "#/components/parameters/TradeDate"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrongStockPoolResponse"
  "/hslt/cxgc/{date}/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hslt_cxgc_12"
      summary: "次新股池"
      description: "根据日期（格式yyyy-MM-dd，例如2026-01-01）作为参数，得到每天的次新股票列表，根据开板几日升序，该接口可获取30天左右的数据。"
      parameters:
        - $ref: "#/components/parameters/TradeDate"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentIpoPoolResponse"
  "/hslt/zbgc/{date}/{licence}":
    get:
      tags: [ "列表与板块" ]
      operationId: "get_hslt_zbgc_13"
      summary: "炸板股池"
      description: "根据日期（格式yyyy-MM-dd，例如2026-01-01）作为参数，得到每天的炸板股票列表，根据首次封板时间升序，该接口可获取30天左右的数据。"
      parameters:
        - $ref: "#/components/parameters/TradeDate"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokenLimitPoolResponse"
  "/hscp/gsjj/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_gsjj_14"
      summary: "公司简介"
      description: "根据《股票列表》得到的股票代码获取上市公司的简介。包括公司基本信息，概念以及发行信息等。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyProfileResponse"
  "/hscp/sszs/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_sszs_15"
      summary: "所属指数"
      description: "根据《股票列表》得到的股票代码获取上市公司的所属指数。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyIndexMembershipResponse"
  "/hscp/ljgg/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_ljgg_16"
      summary: "历届高管成员"
      description: "根据《股票列表》得到的股票代码获取上市公司的历届高管成员名单。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyExecutiveHistoryResponse"
  "/hscp/ljds/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_ljds_17"
      summary: "历届董事会成员"
      description: "根据《股票列表》得到的股票代码获取上市公司的历届董事会成员名单。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyBoardHistoryResponse"
  "/hscp/ljjj/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_ljjj_18"
      summary: "历届监事会成员"
      description: "根据《股票列表》得到的股票代码获取上市公司的历届监事会成员名单。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanySupervisorHistoryResponse"
  "/hscp/jnfh/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_jnfh_19"
      summary: "近年分红"
      description: "根据《股票列表》得到的股票代码获取上市公司的近年来的分红实施结果。按公告日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyDividendHistoryResponse"
  "/hscp/jnzf/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_jnzf_20"
      summary: "近年增发"
      description: "根据《股票列表》得到的股票代码获取上市公司的近年来的增发情况。按公告日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyPrivatePlacementHistoryResponse"
  "/hscp/jjxs/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_jjxs_21"
      summary: "解禁限售"
      description: "根据《股票列表》得到的股票代码获取上市公司的解禁限售情况。按解禁日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyUnlockScheduleResponse"
  "/hscp/jdlr/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_jdlr_22"
      summary: "近一年各季度利润"
      description: "根据《股票列表》得到的股票代码获取上市公司近一年各个季度的利润。按截止日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyQuarterlyProfitResponse"
  "/hscp/jdxj/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_jdxj_23"
      summary: "近一年各季度现金流"
      description: "根据《股票列表》得到的股票代码获取上市公司近一年各个季度的现金流。按截止日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyQuarterlyCashflowResponse"
  "/hscp/yjyg/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_yjyg_24"
      summary: "近年业绩预告"
      description: "根据《股票列表》得到的股票代码获取上市公司近年来的业绩预告。按公告日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyEarningsForecastResponse"
  "/hscp/cwzb/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_cwzb_25"
      summary: "财务指标"
      description: "根据《股票列表》得到的股票代码获取上市公司近四个季度的主要财务指标。按报告日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyFinancialIndicatorResponse"
  "/hscp/sdgd/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_sdgd_26"
      summary: "十大股东"
      description: "根据《股票列表》得到的股票代码获取上市公司的十大股东数据。按截止日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyTopShareholderResponse"
  "/hscp/ltgd/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_ltgd_27"
      summary: "十大流通股东"
      description: "根据《股票列表》得到的股票代码获取上市公司的十大流通股东数据。按公告日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyTopFloatShareholderResponse"
  "/hscp/gdbh/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_gdbh_28"
      summary: "股东变化趋势"
      description: "根据《股票列表》得到的股票代码获取上市公司的股东变化趋势数据。按截止日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyShareholderTrendResponse"
  "/hscp/jjcg/{stock_code}/{licence}":
    get:
      tags: [ "公司资料" ]
      operationId: "get_hscp_jjcg_29"
      summary: "基金持股"
      description: "根据《股票列表》得到的股票代码获取该股票最近500家左右的基金持股情况。按截止日期倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyFundHoldingResponse"
  "/hsrl/ssjy/{stock_code}/{licence}":
    get:
      tags: [ "实时交易" ]
      operationId: "get_hsrl_ssjy_30"
      summary: "实时交易数据（网络数据源）"
      description: "根据《股票列表》得到的股票代码获取实时交易数据（您可以理解为日线的最新数据），该接口为网络公开数据源，非券商数据源。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeTradeNetworkResponse"
  "/hsrl/zbjy/{stock_code}/{licence}":
    get:
      tags: [ "实时交易" ]
      operationId: "get_hsrl_zbjy_31"
      summary: "当天逐笔交易"
      description: "根据《股票列表》得到的股票代码获取当天逐笔交易数据，按时间倒序。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TickTradeTodayResponse"
  "/hsstock/real/time/{stock_code}/{licence}":
    get:
      tags: [ "实时交易" ]
      operationId: "get_hsstock_real_time_32"
      summary: "实时交易数据（券商数据源）"
      description: "根据《股票列表》得到的股票代码获取实时交易数据（您可以理解为日线的最新数据）。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeTradeBrokerResponse"
  "/hsstock/real/five/{stock_code}/{licence}":
    get:
      tags: [ "实时交易" ]
      operationId: "get_hsstock_real_five_33"
      summary: "买卖五档盘口"
      description: "根据《股票列表》得到的股票代码获取实时买卖五档盘口数据。"
      parameters:
        - $ref: "#/components/parameters/StockCode"
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderBookFiveLevelResponse"
  "/hsrl/ssjy/all/{licence}":
    get:
      tags: [ "实时交易" ]
      operationId: "get_hsrl_ssjy_all_34"
      summary: "实时交易数据（全部 | 券商数据源）"
      description: "一次性获取《股票列表》中所有股票的实时交易数据（您可以理解为日线的最新数据），该接口仅限钻石版和包年版证书使用且限制每分钟请求1次。"
      parameters:
        - $ref: "#/components/parameters/Licence"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeTradeAllNetworkResponse"
  "/hsrl/ssjy_more/{licence}":
    get:
      tags: [ "实时交易" ]
      operationId: "get_hsrl_ssjy_more_35"
      summary: "实时交易数据（多股）"
      description: "一次性获取《股票列表》中不超过20支股票的实时交易数据（您可以理解为日线的最新数据）"
      parameters:
        - $ref: "#/components/parameters/Licence"
        - $ref: "#/components/parameters/StockCodes"
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RealtimeTradeMultiStockResponse"
  "/hsrl/real/all/{licence}":
    get:
