components:
  parameters:
    Licence:
      in: "path"
      name: "licence"
      required: true
      description: "Mairui licence，如 LICENCE-xxxx-xxxx"
      schema:
        type: "string"
        example: "F7589DFF-7DCF-4CAB-9D12-980600B44B90"
    StockCode:
      in: "path"
      name: "stock_code"
      required: true
      description: "6位股票代码，如 000001"
      schema:
        type: "string"
        example: "000001"
    MarketCode:
      in: "path"
      name: "market_code"
      required: true
      description: "带市场后缀代码，如 000001.SZ"
      schema:
        type: "string"
        example: "000001.SZ"
    TradeDate:
      in: "path"
      name: "date"
      required: true
      description: "交易日期，格式 yyyy-MM-dd"
      schema:
        type: "string"
        example: "2020-01-15"
